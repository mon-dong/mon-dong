<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌動角落圖鑑</title>
    <!-- 引入必要的樣式與字體 -->
    <script src="https://line-scdn.net"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #fdfaf5; color: #2d4a22; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .bezel { border: 2px solid #2d4a22; border-radius: 32px; background: white; }
        .grid-img { filter: grayscale(100%) opacity(0.3); transition: 0.5s; width: 100%; height: 100%; object-fit: contain; }
        .grid-img.unlocked { filter: grayscale(0%) opacity(1); }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10 min-h-screen">

    <!-- 頂部標題 -->
    <header class="text-center py-10">
        <div class="inline-block bg-[#2d4a22] text-white px-3 py-1 rounded-full text-[10px] tracking-widest mb-2 uppercase">Field Discovery</div>
        <h1 class="serif text-4xl italic tracking-tighter">萌動角落《萌動力》</h1>
    </header>

    <!-- 收集顯示區 (Scan View) -->
    <div id="scan-view" class="hidden max-w-sm mx-auto p-6 text-center">
        <h2 id="species-name" class="serif text-3xl mb-1">---</h2>
        <p id="species-latin" class="text-xs italic text-stone-400 mb-6 font-serif">Loading...</p>
        
        <div class="bg-white bezel p-8 mb-6 shadow-xl flex items-center justify-center">
            <img id="species-img" src="" class="w-48 h-48 object-contain">
        </div>

        <div id="status-msg" class="text-xs mb-8 text-stone-500 bg-white/50 p-4 rounded-xl border border-dashed border-stone-300">
            🔍 正在比對生物波長...
        </div>
        
        <button id="btn-collect" onclick="checkLocation()" class="w-full bg-[#2d4a22] text-white py-4 rounded-full font-bold shadow-lg active:scale-95 transition-all">
            收錄數據 (COLLECT)
        </button>

        <!-- 成功後顯示 -->
        <div id="success-extra" class="hidden mt-6 text-left">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 mb-4">
                <h4 class="font-bold text-[#2d4a22] text-xs mb-2">● 科普筆記</h4>
                <p id="species-info" class="text-sm leading-relaxed text-stone-600 font-medium"></p>
            </div>
            <a id="comic-link" href="#" target="_blank" class="block w-full bg-green-800 text-white text-center py-4 rounded-2xl text-sm font-bold shadow-md">
                📖 閱讀改編漫畫
            </a>
        </div>
    </div>

    <!-- 我的圖鑑區 (Grid View) -->
    <div id="collection-view" class="max-w-md mx-auto px-6">
        <div class="flex justify-between items-end mb-6 border-b-2 border-[#2d4a22] pb-2">
            <h3 class="serif text-xl font-bold">我的萌動圖鑑</h3>
            <span id="progress-text" class="text-xs font-bold bg-[#2d4a22] text-white px-2 py-0.5 rounded">0/2</span>
        </div>
        <div id="collection-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        const LIFF_ID = "2009975666-bAjGYenl";
        const GITHUB_URL = "https://github.io";

        const speciesDB = {
            "psilotum": { 
                name: "松葉蕨", latin: "Psilotum nudum", check: true, lat: 24.1392, lng: 120.6657, 
                img: "psilotum_char.png.JPG", 
                comic: "psilotum_com.png.png",
                info: "我是最原始的維管束植物，長得像綠色掃帚。我沒有真正的根和葉子，完全靠地下莖吸收水分喔！"
            },
            "apis": { 
                name: "西洋蜂", latin: "Apis mellifera", check: false,
                img: "https://placeholder.com", 
                comic: "#",
                info: "社會性昆蟲，是都市中最勤奮的粉媒者。"
            }
        };

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const urlParams = new URLSearchParams(window.location.search);
                const target = urlParams.get('species');
                
                renderGrid();

                if (target && speciesDB[target]) {
                    document.getElementById('collection-view').classList.add('hidden');
                    showScanView(target);
                }
            } catch (err) { console.error(err); }
        }

        function showScanView(id) {
            const s = speciesDB[id];
            document.getElementById('scan-view').classList.remove('hidden');
            document.getElementById('species-name').innerText = s.name;
            document.getElementById('species-latin').innerText = s.latin;
            document.getElementById('species-img').src = s.img.startsWith('http') ? s.img : GITHUB_URL + s.img;
            document.getElementById('species-info').innerText = s.info;
            document.getElementById('comic-link').href = s.comic.startsWith('http') ? s.comic : GITHUB_URL + s.comic;
            
            if (!s.check) document.getElementById('status-msg').innerText = "✨ 此處生物信號強烈，可直接收錄。";
        }

        function checkLocation() {
            const id = new URLSearchParams(window.location.search).get('species') || 'psilotum';
            const s = speciesDB[id];
            if (!s.check) return saveData(id);

            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = Math.sqrt(Math.pow(pos.coords.latitude - s.lat, 2) + Math.pow(pos.coords.longitude - s.lng, 2)) * 111;
                if (dist < 5.0) {
                    saveData(id);
                } else {
                    document.getElementById('status-msg').innerHTML = `⚠️ 距離過遠 (${dist.toFixed(1)}km)<br>請靠近國漫館紅磚牆附近！`;
                }
            }, () => alert("請開啟定位權限以採集數據。"));
        }

        function saveData(id) {
            let collection = JSON.parse(localStorage.getItem('mon_dong_v2') || '{}');
            collection[id] = true;
            localStorage.setItem('mon_dong_v2', JSON.stringify(collection));
            
            document.getElementById('status-msg').innerHTML = "💚 捕捉成功！數據已寫入圖鑑。";
            document.getElementById('btn-collect').classList.add('hidden');
            document.getElementById('success-extra').classList.remove('hidden');
            renderGrid();
        }

        function renderGrid() {
            const saved = JSON.parse(localStorage.getItem('mon_dong_v2') || '{}');
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';
            let count = 0;
            
            Object.keys(speciesDB).forEach(key => {
                const isFound = saved[key];
                if (isFound) count++;
                const s = speciesDB[key];
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm border border-stone-100 text-center";
                card.onclick = () => { if(isFound) window.location.search = `?species=${key}`; };
                
                const imgSrc = s.img.startsWith('http') ? s.img : GITHUB_URL + s.img;
                
                card.innerHTML = `
                    <div class="h-24 flex items-center justify-center mb-2">
                        <img src="${imgSrc}" class="grid-img ${isFound ? 'unlocked' : ''}">
                    </div>
                    <div class="text-[10px] font-bold ${isFound ? 'text-[#2d4a22]' : 'text-stone-300'} uppercase">
                        ${isFound ? s.name : 'Unknown'}
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('progress-text').innerText = `${count}/2`;
        }
        init();
    </script>
</body>
</html>
