<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌動角落圖鑑</title>
    <script src="https://line-scdn.net"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #fdfaf5; color: #2d4a22; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .bezel { border: 2px solid #2d4a22; border-radius: 32px; background: white; }
        .grid-img { filter: grayscale(100%) opacity(0.2); transition: 0.5s; width: 100%; height: 100%; object-fit: contain; }
        .grid-img.unlocked { filter: grayscale(0%) opacity(1); }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10 min-h-screen">

    <!-- 頂部標題 -->
    <header id="main-header" class="text-center py-10">
        <div class="inline-block bg-[#2d4a22] text-white px-3 py-1 rounded-full text-[10px] tracking-widest mb-2 uppercase">Field Discovery</div>
        <h1 class="serif text-4xl italic tracking-tighter">萌動角落《萌動力》</h1>
    </header>

    <!-- 1. 捕捉視窗 (Scan View) -->
    <div id="scan-view" class="hidden max-w-sm mx-auto p-6 text-center">
        <h2 id="species-name" class="serif text-3xl mb-1">---</h2>
        <p id="species-latin" class="text-xs italic text-stone-400 mb-6 font-serif">Scientific Name</p>
        <div class="bg-white bezel p-8 mb-6 shadow-xl flex items-center justify-center relative">
            <img id="species-img" src="" class="w-48 h-48 object-contain relative z-10">
        </div>
        <div id="status-msg" class="text-xs mb-8 text-stone-500 bg-white/50 p-4 rounded-xl border border-dashed border-stone-300">
            🔍 偵測生物波長中...
        </div>
        <button id="btn-collect" onclick="checkLocation()" class="w-full bg-[#2d4a22] text-white py-4 rounded-full font-bold shadow-lg active:scale-95 transition-all">
            收錄數據 (COLLECT)
        </button>
        <div id="success-btn-area" class="hidden">
            <button onclick="openReader()" class="w-full bg-green-800 text-white py-4 rounded-2xl font-bold text-sm shadow-md text-center animate-bounce">
                📖 閱讀科普漫畫 (下滑看科普)
            </button>
        </div>
    </div>

    <!-- 2. 長條閱讀器 (Overlay) -->
    <div id="reading-overlay" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto">
        <button onclick="closeReader()" class="fixed top-6 right-6 bg-black/60 text-white w-10 h-10 rounded-full z-50 flex items-center justify-center font-bold">✕</button>
        <div class="flex flex-col items-center">
            <img id="comic-full-img" src="" class="w-full h-auto">
            <div class="p-10 bg-[#fdfaf5] w-full border-t-4 border-[#2d4a22]">
                <div class="mb-4 text-[10px] tracking-widest text-green-800 font-bold uppercase">● Field Notes</div>
                <h2 id="reader-species-name" class="serif text-3xl mb-6">---</h2>
                <div id="reader-species-info" class="text-stone-700 leading-loose text-lg space-y-6 font-medium"></div>
                <div class="mt-20 py-10 text-center border-t border-stone-200 opacity-30 text-[10px]">萌動角落計畫 © 科學漫畫工作室</div>
            </div>
        </div>
    </div>

    <!-- 3. 我的圖鑑區 -->
    <div id="collection-view" class="max-w-md mx-auto px-6">
        <div class="flex justify-between items-end mb-6 border-b-2 border-[#2d4a22] pb-2 text-xl font-bold italic">
            <h3 class="serif">我的萌動圖鑑</h3>
            <span id="progress-text" class="text-xs bg-[#2d4a22] text-white px-2 py-0.5 rounded">0/2</span>
        </div>
        <div id="collection-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        const LIFF_ID = "2009975666-bAjGYenl";
        const GITHUB_URL = "https://github.io";

        // 所有的生物資料與科普短文直接內建在下面
        const speciesDB = {
            "psilotum": { 
                name: "松葉蕨", latin: "Psilotum nudum", check: true, lat: 24.1392, lng: 120.6657, 
                img: "psilotum_char.png.JPG", 
                comic: "psilotum_com.png.png", 
                info: "我是最原始的維管束植物，長得像綠色掃帚。我沒有真正的根和葉子，完全靠地下莖吸收水分喔！也因為長得像掃帚，所以又被稱為「鳥巢蕨」或「鐵掃帚」。"
            },
            "apis": { 
                name: "西洋蜂", latin: "Apis mellifera", check: false,
                img: "apis_char.png", 
                comic: "apis_com.png", 
                info: "大家喝的蜂蜜都是我們辛苦採集來的，我是都市裡的搬運工。西洋蜂是社會性昆蟲，是都市中最勤奮的粉媒者。牠們的腳上有「花粉籃」，可以收集大量的花粉回巢喔！"
            }
        };

        function startApp() {
            if (typeof liff !== 'undefined') { initLIFF(); } 
            else { setTimeout(startApp, 100); }
        }

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                renderGrid();
                const target = new URLSearchParams(window.location.search).get('species');
                if (target && speciesDB[target]) {
                    document.getElementById('collection-view').classList.add('hidden');
                    showScanView(target);
                }
            } catch (err) { console.error(err); }
        }

        function showScanView(id) {
            const s = speciesDB[id];
            document.getElementById('scan-view').classList.remove('hidden');
            document.getElementById('species-name').innerText = s.name;
            document.getElementById('species-latin').innerText = s.latin;
            document.getElementById('species-img').src = GITHUB_URL + s.img;
        }

        function checkLocation() {
            const id = new URLSearchParams(window.location.search).get('species') || 'psilotum';
            const s = speciesDB[id];
            if (!s.check) return saveData(id);
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = Math.sqrt(Math.pow(pos.coords.latitude-s.lat,2)+Math.pow(pos.coords.longitude-s.lng,2))*111;
                if (dist < 5.0) saveData(id); // 測試距離 5 公里
                else document.getElementById('status-msg').innerText = "⚠️ 距離過遠 ("+dist.toFixed(1)+"km)";
            }, () => alert("請開啟定位權限"));
        }

        function saveData(id) {
            let collection = JSON.parse(localStorage.getItem('mon_dong_v2') || '{}');
            collection[id] = true;
            localStorage.setItem('mon_dong_v2', JSON.stringify(collection));
            document.getElementById('status-msg').innerHTML = "💚 捕捉成功！數據已寫入圖鑑。";
            document.getElementById('btn-collect').classList.add('hidden');
            document.getElementById('success-btn-area').classList.remove('hidden');
            renderGrid();
        }

        function openReader() {
            const id = new URLSearchParams(window.location.search).get('species') || 'psilotum';
            const s = speciesDB[id];
            document.getElementById('comic-full-img').src = GITHUB_URL + s.comic;
            document.getElementById('reader-species-name').innerText = s.name;
            document.getElementById('reader-species-info').innerHTML = s.info.replace(/\n/g, '<br>');
            document.getElementById('reading-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeReader() {
            document.getElementById('reading-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function renderGrid() {
            const saved = JSON.parse(localStorage.getItem('mon_dong_v2') || '{}');
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';
            let count = 0;
            Object.keys(speciesDB).forEach(key => {
                const isFound = saved[key];
                if (isFound) count++;
                const s = speciesDB[key];
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl border border-stone-100 text-center cursor-pointer";
                card.onclick = () => { if(isFound) openReaderParam(key); };
                card.innerHTML = `<div class="h-24 flex items-center justify-center mb-2"><img src="${GITHUB_URL + s.img}" class="grid-img ${isFound ? 'unlocked' : ''}"></div><div class="text-[10px] font-bold ${isFound ? 'text-[#2d4a22]' : 'text-stone-300'} uppercase">${isFound ? s.name : 'Unknown'}</div>`;
                grid.appendChild(card);
            });
            document.getElementById('progress-text').innerText = `${count}/${Object.keys(speciesDB).length}`;
        }
        function openReaderParam(id) {
            const s = speciesDB[id];
            document.getElementById('comic-full-img').src = GITHUB_URL + s.comic;
            document.getElementById('reader-species-name').innerText = s.name;
            document.getElementById('reader-species-info').innerHTML = s.info.replace(/\n/g, '<br>');
            document.getElementById('reading-overlay').classList.remove('hidden');
        }
        startApp();
    </script>
</body>
</html>
