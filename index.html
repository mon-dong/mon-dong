<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌動角落圖鑑</title>
    <script src="https://line-scdn.net"></script>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { background: #fdfaf5; color: #2d4a22; overflow-x: hidden; }
        .serif { font-family: 'Noto Serif TC', serif; }
        .bezel { border: 2px solid #2d4a22; border-radius: 32px; background: white; }
        .grid-img { filter: grayscale(100%) opacity(0.2); transition: 0.5s; width: 100%; height: 100%; object-fit: contain; }
        .grid-img.unlocked { filter: grayscale(0%) opacity(1); }
        .hidden { display: none; }
        /* 閱讀器平滑滾動 */
        #reading-overlay { scroll-behavior: smooth; }
    </style>
</head>
<body class="pb-10 min-h-screen">

    <!-- 頂部標題 -->
    <header id="main-header" class="text-center py-10">
        <div class="inline-block bg-[#2d4a22] text-white px-3 py-1 rounded-full text-[10px] tracking-widest mb-2 uppercase">Field Discovery</div>
        <h1 class="serif text-4xl italic tracking-tighter">萌動角落《萌動力》</h1>
    </header>

    <!-- 1. 掃碼捕捉視窗 (Scan View) -->
    <div id="scan-view" class="hidden max-w-sm mx-auto p-6 text-center">
        <h2 id="species-name" class="serif text-3xl mb-1">---</h2>
        <p id="species-latin" class="text-xs italic text-stone-400 mb-6 font-serif">Loading...</p>
        <div class="bg-white bezel p-8 mb-6 shadow-xl flex items-center justify-center relative">
            <div class="absolute inset-0 bg-green-50 rounded-full blur-3xl opacity-30"></div>
            <img id="species-img" src="" class="w-48 h-48 object-contain relative z-10">
        </div>
        <div id="status-msg" class="text-xs mb-8 text-stone-500 bg-white/50 p-4 rounded-xl border border-dashed border-stone-300">
            🔍 正在比對生物波長...
        </div>
        <button id="btn-collect" onclick="checkLocation()" class="w-full bg-[#2d4a22] text-white py-4 rounded-full font-bold shadow-lg active:scale-95 transition-all">
            收錄數據 (COLLECT)
        </button>
        <div id="success-btn-area" class="hidden animate-bounce">
            <button onclick="openReaderFromParams()" class="w-full bg-green-800 text-white py-4 rounded-2xl font-bold text-sm shadow-md text-center">
                📖 閱讀科普漫畫 (往下看科普)
            </button>
        </div>
    </div>

    <!-- 2. 長條閱讀器 (Overlay) -->
    <div id="reading-overlay" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto">
        <button onclick="closeReader()" class="fixed top-6 right-6 bg-black/60 text-white w-10 h-10 rounded-full z-[60] flex items-center justify-center font-bold">✕</button>
        <div class="flex flex-col items-center">
            <!-- 上方：漫畫長條圖 -->
            <img id="comic-full-img" src="" class="w-full h-auto shadow-lg">
            <!-- 下方：從外部 TXT 抓取的科普文 -->
            <div class="p-10 bg-[#fdfaf5] w-full border-t-4 border-[#2d4a22]">
                <div class="mb-4 text-[10px] tracking-widest text-green-800 font-bold uppercase">● Scientific Field Notes</div>
                <h2 id="reader-species-name" class="serif text-3xl mb-6">---</h2>
                <div id="reader-species-info" class="text-stone-700 leading-loose text-lg space-y-6 font-medium">
                    <!-- 科普文字會自動填入 -->
                </div>
                <div class="mt-20 py-10 text-center border-t border-stone-200 opacity-30 text-[10px] tracking-widest">
                    萌動角落計畫 © 科學漫畫工作室
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 我的圖鑑清單 (Grid View) -->
    <div id="collection-view" class="max-w-md mx-auto px-6">
        <div class="flex justify-between items-end mb-6 border-b-2 border-[#2d4a22] pb-2 text-xl font-bold">
            <h3 class="serif">我的萌動圖鑑</h3>
            <span id="progress-text" class="text-xs bg-[#2d4a22] text-white px-2 py-0.5 rounded tracking-tighter">0/0</span>
        </div>
        <div id="collection-grid" class="grid grid-cols-2 gap-4">
            <!-- 動態生成格子 -->
        </div>
    </div>

    <script>
        const LIFF_ID = "2009975666-bAjGYenl";
        const GITHUB_URL = "https://github.io";
        let speciesDB = {};

        async function init() {
            try {
                // 步驟 1: 讀取外部 JSON 配置檔
                const response = await fetch(GITHUB_URL + 'data.json?v=' + Date.now());
                speciesDB = await response.json();

                // 步驟 2: 初始化 LIFF
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                renderGrid();

                // 步驟 3: 判斷網址是否有生物參數
                const params = new URLSearchParams(window.location.search);
                const target = params.get('species');
                if (target && speciesDB[target]) {
                    document.getElementById('collection-view').classList.add('hidden');
                    showScanView(target);
                }
            } catch (err) { 
                console.error("初始化失敗:", err);
                alert("無法讀取資料庫，請檢查網路連線。");
            }
        }

        function showScanView(id) {
            const s = speciesDB[id];
            document.getElementById('scan-view').classList.remove('hidden');
            document.getElementById('species-name').innerText = s.name;
            document.getElementById('species-latin').innerText = s.latin;
            document.getElementById('species-img').src = GITHUB_URL + s.img;
            
            if (s.check === false) {
                document.getElementById('status-msg').innerText = "✨ 此處生物信號強烈，可直接收錄。";
            }
        }

        function checkLocation() {
            const id = new URLSearchParams(window.location.search).get('species') || 'psilotum';
            const s = speciesDB[id];
            
            // 如果不需要檢查位置，直接存檔
            if (s.check === false) return saveData(id);

            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = Math.sqrt(Math.pow(pos.coords.latitude - s.lat, 2) + Math.pow(pos.coords.longitude - s.lng, 2)) * 111;
                if (dist < 5.0) { // 測試距離 5km
                    saveData(id);
                } else {
                    document.getElementById('status-msg').innerHTML = `⚠️ 距離過遠 (${dist.toFixed(1)}km)<br>請靠近指定地點後再收錄！`;
                }
            }, () => alert("請開啟定位權限以採集數據。"));
        }

        function saveData(id) {
            let collection = JSON.parse(localStorage.getItem('mon_dong_v2') || '{}');
            collection[id] = true;
            localStorage.setItem('mon_dong_v2', JSON.stringify(collection));
            
            document.getElementById('status-msg').innerHTML = "💚 捕捉成功！數據已寫入圖鑑。";
            document.getElementById('btn-collect').classList.add('hidden');
            document.getElementById('success-btn-area').classList.remove('hidden');
            renderGrid();
        }

        // 掃碼成功後的閱讀觸發
        function openReaderFromParams() {
            const id = new URLSearchParams(window.location.search).get('species');
            openReader(id);
        }

        // 核心閱讀器邏輯
        async function openReader(id) {
            const s = speciesDB[id];
            const overlay = document.getElementById('reading-overlay');
            
            // 設定漫畫圖
            document.getElementById('comic-full-img').src = GITHUB_URL + s.comic;
            document.getElementById('reader-species-name').innerText = s.name;
            
            // 清空舊內容並顯示 Loading
            document.getElementById('reader-species-info').innerHTML = "讀取科普筆記中...";

            // 從外部文字檔抓取科普內容
            try {
                const response = await fetch(GITHUB_URL + s.infoFile + '?v=' + Date.now());
                const text = await response.text();
                // 處理換行符號
                document.getElementById('reader-species-info').innerHTML = text.replace(/\n/g, '<br>');
            } catch (e) {
                document.getElementById('reader-species-info').innerText = "科普內容建置中，敬請期待！";
            }
            
            overlay.classList.remove('hidden');
            overlay.scrollTop = 0;
            // 禁止背景滾動
            document.body.style.overflow = 'hidden';
        }

        function closeReader() {
            document.getElementById('reading-overlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function renderGrid() {
            const saved = JSON.parse(localStorage.getItem('mon_dong_v2') || '{}');
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';
            let count = 0;
            
            Object.keys(speciesDB).forEach(key => {
                const isFound = saved[key];
                if (isFound) count++;
                const s = speciesDB[key];
                
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm border border-stone-100 text-center cursor-pointer active:scale-95 transition-all";
                
                // 點擊已解鎖的格子開啟長條閱讀器
                card.onclick = () => { if(isFound) openReader(key); };
                
                card.innerHTML = `
                    <div class="h-24 flex items-center justify-center mb-2">
                        <img src="${GITHUB_URL + s.img}" class="grid-img ${isFound ? 'unlocked' : ''}">
                    </div>
                    <div class="text-[10px] font-bold ${isFound ? 'text-[#2d4a22]' : 'text-stone-300'} uppercase">
                        ${isFound ? s.name : 'Unknown'}
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('progress-text').innerText = `${count} / ${Object.keys(speciesDB).length}`;
        }

        init();
    </script>
</body>
</html>
