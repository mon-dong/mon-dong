<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌動圖鑑</title>
    <script src="https://line-scdn.net"></script>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen p-4 font-sans text-stone-800">
    <header class="text-center py-6">
        <h1 class="text-2xl font-bold tracking-tighter text-green-900">🌿 萌動角落圖鑑</h1>
        <p class="text-xs text-stone-500 mt-1 uppercase tracking-widest italic">Digital Biological Encyclopedia</p>
    </header>

    <!-- 掃碼顯示區 -->
    <div id="scan-view" class="hidden max-w-sm mx-auto bg-white rounded-3xl shadow-xl p-8 mb-8 text-center border-2 border-green-800">
        <div id="species-category" class="text-[10px] bg-green-800 text-white px-3 py-1 rounded-full inline-block mb-3">生物載入中</div>
        <h2 id="species-name" class="text-3xl font-black mb-1 text-stone-900">讀取中...</h2>
        <p id="species-latin" class="text-sm italic text-stone-400 mb-6 font-serif"></p>
        <div id="status-msg" class="text-sm p-4 bg-stone-50 rounded-xl border border-stone-200 mb-6 leading-relaxed">
            🔍 偵測到微弱生物訊號...
        </div>
        <button id="btn-collect" onclick="checkLocation()" class="w-full bg-green-900 text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">
            立即捕捉
        </button>
    </div>

    <!-- 我的圖鑑區 -->
    <div class="max-w-md mx-auto">
        <h3 class="font-bold text-sm mb-4 flex items-center">
            <span class="w-4 h-4 bg-green-800 rounded-full mr-2"></span> 我的採集進度
        </h3>
        <div id="collection-grid" class="grid grid-cols-2 gap-4"></div>
    </div>

    <script>
        const LIFF_ID = "2009975666-bAjGYenl";
        const speciesDB = {
            "psilotum": { name: "松葉蕨", latin: "Psilotum nudum", cat: "遠古類群", check: true, lat: 24.1392, lng: 120.6657, hint: "牠躲在國漫館的紅磚牆縫中！" },
            "apis": { name: "西洋蜂", latin: "Apis mellifera", cat: "社會昆蟲", check: false },
            "termites": { name: "台灣土白蟻", latin: "Odontotermes formosanus", cat: "地下農夫", check: false },
            "spider": { name: "安德遜蠅虎", latin: "Hasarius adansoni", cat: "跳躍獵人", check: false },
            "dandelion": { name: "西洋蒲公英", latin: "Taraxacum officinale", cat: "冒險種子", check: true, lat: 24.1501, lng: 120.6644, hint: "常見於科博館周邊草坪。" },
            "termite2": { name: "新渡戶歪白蟻", latin: "Pericapritermes nitobei", cat: "彈指兵蟻", check: false },
            "barringtonia": { name: "穗花棋盤腳", latin: "Barringtonia racemosa", cat: "夏夜煙火", check: true, lat: 24.1555, lng: 120.6601, hint: "校園水池邊才看得到牠開花。" },
            "ficus": { name: "榕樹", latin: "Ficus microcarpa", cat: "都市守護者", check: false },
            "wasp": { name: "榕果小蜂", latin: "Eupristina verticillata", cat: "絕對共生", check: true, lat: 24.1450, lng: 120.6620, hint: "就在榕樹的隱頭花序裡！" },
            "bougainvillea": { name: "九重葛", latin: "Bougainvillea spectabilis", cat: "多彩苞片", check: false }
        };

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const urlParams = new URLSearchParams(window.location.search);
                    const target = urlParams.get('species');
                    if (target && speciesDB[target]) showScanView(target);
                    renderGrid();
                }
            } catch (e) { console.log(e); }
        }

        function showScanView(id) {
            const s = speciesDB[id];
            document.getElementById('scan-view').classList.remove('hidden');
            document.getElementById('species-name').innerText = s.name;
            document.getElementById('species-latin').innerText = s.latin;
            document.getElementById('species-category').innerText = s.cat;
            if (!s.check) document.getElementById('status-msg').innerText = "✨ 此物種訊號強烈，可直接捕捉！";
        }

        function checkLocation() {
            const id = new URLSearchParams(window.location.search).get('species') || 'psilotum';
            const s = speciesDB[id];
            if (!s.check) { saveData(id); return; }
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = Math.sqrt(Math.pow(pos.coords.latitude - s.lat, 2) + Math.pow(pos.coords.longitude - s.lng, 2)) * 111;
                if (dist < 0.2) saveData(id);
                else document.getElementById('status-msg').innerHTML = `⚠️ 距離太遠 (${dist.toFixed(1)}km)<br><span class="text-red-700 text-xs">${s.hint}</span>`;
            }, () => alert("請開啟定位權限"));
        }

        function saveData(id) {
            let collection = JSON.parse(localStorage.getItem('mon_dong_v1') || '{}');
            collection[id] = true;
            localStorage.setItem('mon_dong_v1', JSON.stringify(collection));
            document.getElementById('status-msg').innerHTML = "💚 捕捉成功！已收錄至圖鑑。";
            setTimeout(() => location.href = window.location.pathname, 1500);
        }

        function renderGrid() {
            const saved = JSON.parse(localStorage.getItem('mon_dong_v1') || '{}');
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';
            Object.keys(speciesDB).forEach(key => {
                const isFound = saved[key];
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl border ${isFound ? 'bg-white border-green-200' : 'bg-stone-200 opacity-50 border-transparent'} text-center`;
                card.innerHTML = `<div class="text-2xl mb-2">${isFound ? '💎' : '❓'}</div><div class="text-xs font-bold">${isFound ? speciesDB[key].name : '未解鎖'}</div>`;
                grid.appendChild(card);
            });
        }
        init();
    </script>
</body>
</html>
